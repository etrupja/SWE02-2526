<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IMDB Top 250 Movies</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { text-align: center; }
    #movies { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .movie-card {
      background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 180px; padding: 10px; text-align: center;
    }
    .movie-card img { width: 100%; border-radius: 4px; }
    .movie-card h3 { font-size: 14px; margin: 8px 0 4px; }
    .movie-card p { font-size: 12px; color: #666; margin: 2px 0; }
    .rating { color: #f5c518; font-weight: bold; font-size: 14px; }
    #loading { text-align: center; font-size: 18px; margin-top: 40px; }
  </style>
</head>
<body>
  <h1>IMDB Top 250 Movies</h1>
  <div id="loading">Loading...</div>
  <div id="movies"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="scripts/classwork.js"></script>
</body>
</html>
