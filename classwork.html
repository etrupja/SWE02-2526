<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Lookup – Classwork 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<style>
    .hidden{
        display: none;
    }
</style>

<div class="container py-5">
    <h2 class="mb-4">Weather API</h2>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-9">
                    <input type="text" id="cityInput" class="form-control form-control-lg" placeholder="City name">
                </div>
                <div class="col-md-3 d-grid">
                    <button id="searchBtn" style="background: black; color: white">Search</button>
                </div>
            </div>
        </div>
    </div>

    <div id="weatherCard" class="card hidden">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0" id="cityName">—</h4>
        </div>
        <div class="card-body">
            <div class="row text-center">
                <div class="col-md-3 border-end">
                    <img id="weatherIcon" src="" alt="Weather icon" style="width:80px;">
                    <p id="weatherDesc" class="text-capitalize fw-semibold mt-1">—</p>
                </div>
                <div class="col-md-3 border-end">
                    <h1 id="temp" class="display-4 fw-bold">—</h1>
                    <p class="text-muted">Temperature</p>
                    <small id="feelsLike" class="text-muted">Feels like: —</small>
                </div>
                <div class="col-md-3 border-end">
                    <h3 id="humidity" class="mt-3">—</h3>
                    <p class="text-muted">Humidity</p>
                    <h3 id="wind">—</h3>
                    <p class="text-muted">Wind speed</p>
                </div>
                <div class="col-md-3">
                    <h3 id="visibility" class="mt-3">—</h3>
                    <p class="text-muted">Visibility</p>
                    <h3 id="pressure">—</h3>
                    <p class="text-muted">Pressure</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="scripts/classwork.js"></script>
</body>
</html>
