<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football News - News Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand mb-0 h1" href="/">News Tracker</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="card-title mb-4">Search Football News</h2>

                        <div class="row g-3 mb-4">
                            <div class="col-md-9">
                                <label for="searchInput" class="form-label">Search Topic</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="searchInput" 
                                    placeholder="Enter player or topic, e.g. Ronaldo"
                                >
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button type="button" class="btn btn-primary w-100" onclick="movies()">Search News</button>
                            </div>
                        </div>

                        <div id="news-container" class="row g-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        function movies() {
            const searchValue = document.getElementById("searchInput").value.trim() || "Football";

            const settings = {
                async: true,
                crossDomain: true,
                url: `https://real-time-news-data.p.rapidapi.com/search?query=${encodeURIComponent(searchValue)}&limit=10&time_published=anytime&country=US&lang=en`,
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '90759be50dmsh864952a04bd881ep160f09jsnf3871288fa1e',
                    'x-rapidapi-host': 'real-time-news-data.p.rapidapi.com',
                    'Content-Type': 'application/json'
                }
            };

            const container = document.getElementById("news-container");
            container.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-info mb-0">Loading news...</div>
                </div>
            `;

            $.ajax(settings).done(function (response) {
                container.innerHTML = "";

                const articles = response.data || [];

                if (articles.length === 0) {
                    container.innerHTML = `
                        <div class="col-12">
                            <div class="alert alert-warning mb-0">No news found for "${searchValue}".</div>
                        </div>
                    `;
                    return;
                }

                articles.forEach(article => {
                    container.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card h-100 shadow-sm">
                                ${article.photo_url ? `<img src="${article.photo_url}" class="card-img-top" alt="News Image">` : ""}
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title">${article.title || "No Title Available"}</h5>
                                    <p class="card-text text-muted">${article.summary || "No summary available."}</p>
                                    <a href="${article.link}" target="_blank" class="btn btn-outline-primary mt-auto">Read More</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }).fail(function () {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger mb-0">Failed to load news. Please try again.</div>
                    </div>
                `;
            });
        }

        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                movies();
            }
        });
    </script>
</body>
</html>
